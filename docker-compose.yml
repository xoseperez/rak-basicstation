services:
  
  rak-basicstation:

    container_name: rak-basicstation
    image: rakwireless/basicstation
    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      chirpstack-concentratord:
        condition: service_healthy
    
    restart: unless-stopped
    
    environment:

      # Backend selection: "concentratord" or "semtech_udp"
      #- BACKEND_ENABLED=concentratord

      # Gateway ID (leave empty for auto-discovery)
      #- BACKEND_GATEWAY_ID=

      # Concentratord ZMQ IPC URLs
      #- CONCENTRATORD_EVENT_URL=ipc:///tmp/concentratord_event
      #- CONCENTRATORD_COMMAND_URL=ipc:///tmp/concentratord_command

      # Enable context caching (concentratord backend only).
      # When enabled the full rx_info.context blob is cached on uplink and
      # restored on downlink, so concentratord receives the original opaque
      # context rather than a 4-byte count_us fallback.
      #- CONCENTRATORD_CONTEXT_CACHING=false

      # Semtech UDP backend bind address
      #- SEMTECH_UDP_BIND=0.0.0.0:1700

      # LNS WebSocket server URI
      - LNS_SERVER=wss://localhost:8887
      #- LNS_RECONNECT_INTERVAL=5s

      # CUPS configuration
      #- CUPS_ENABLED=false
      #- CUPS_SERVER=

      # Logging level: TRACE, DEBUG, INFO, WARN, ERROR, OFF
      #- LOG_LEVEL=info
    
    volumes:
      
      # Concentratord IPC sockets
      - /tmp:/tmp
      
      # Path to the TLS certificates and keys (tc.trust, tc.cert and tc.key for LNS; cups.trust, cups.cert and cups.key for CUPS)
      - ./certs:/etc/rak-basicstation/certs:ro
      
      # CUPS credentials persistence
      - cups-credentials:/var/lib/rak-basicstation/credentials
    
    ports:
      - "1700:1700/udp"

  # See https://github.com/xoseperez/chirpstack-concentratord-docker
  chirpstack-concentratord:

    container_name: chirpstack-concentratord
    image: xoseperez/chirpstack-concentratord
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/concentratord_command"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - /tmp:/tmp
    devices:
      - /dev/rak5146:/dev/ttyACM0
    group_add:
      - dialout
    environment:
      - MODEL=RAK5146
      - INTERFACE=USB

volumes:
  cups-credentials:
